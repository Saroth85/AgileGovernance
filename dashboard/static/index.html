<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agile Delivery Governance — Backlog Health</title>
<style>
  :root{
    --teal:#0F6E56; --teal2:#12A47E; --mint:#5EEAD4; --ink:#12302B;
    --bg:#F4F8F7; --card:#FFFFFF; --line:#E2EEEA; --muted:#5B6B68;
    --amber:#B07A0A; --amber-bg:#FBF1DD; --green:#0F6E56; --red:#B23A2E;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink)}
  header{background:var(--ink);color:#fff;padding:22px 32px}
  header h1{margin:0;font-size:20px;font-weight:700}
  header .sub{color:var(--mint);font-size:13px;margin-top:4px}
  .wrap{max-width:1180px;margin:0 auto;padding:24px 32px 60px}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px}
  .stat .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .stat .value{font-size:34px;font-weight:800;color:var(--teal);margin-top:6px;font-variant-numeric:tabular-nums}
  .stat.review .value{color:var(--amber)}
  .grid{display:grid;grid-template-columns:1fr 1.2fr;gap:20px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px}
  .panel h2{margin:0 0 16px;font-size:15px;color:var(--teal)}
  .bar-row{display:flex;align-items:center;gap:12px;margin:9px 0;font-size:13px}
  .bar-row .name{width:96px;color:var(--ink);text-transform:capitalize}
  .bar-track{flex:1;background:#EEF4F2;border-radius:6px;height:14px;overflow:hidden}
  .bar-fill{height:100%;background:var(--teal2);border-radius:6px}
  .bar-row .n{width:24px;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}
  .issue{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
  .issue:last-child{border-bottom:none}
  .issue .cnt{background:#EEF4F2;border-radius:10px;padding:1px 9px;color:var(--teal);font-weight:700}
  .qitem{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:14px}
  .qitem .top{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .qitem .title{font-weight:700;font-size:14px}
  .score{background:var(--amber-bg);color:var(--amber);font-weight:700;border-radius:10px;
          padding:2px 10px;font-size:12px;white-space:nowrap}
  .desc{color:var(--muted);font-size:13px;margin:8px 0 10px;line-height:1.45}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .chip{background:#EEF4F2;color:var(--teal);border-radius:12px;padding:2px 10px;font-size:11.5px;font-weight:600}
  .chip.block{background:#FBE3DE;color:var(--red)}
  .meta{font-size:11.5px;color:var(--muted);margin-bottom:10px}
  .actions{display:flex;gap:10px}
  button{border:none;border-radius:9px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer}
  .approve{background:var(--teal);color:#fff}
  .reject{background:#fff;color:var(--red);border:1px solid #E3B6AF}
  .empty{color:var(--muted);font-size:13px;padding:20px;text-align:center}
  .foot{color:var(--muted);font-size:12px;margin-top:18px}
  @media(max-width:820px){.cards{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>Agile Delivery Governance — Backlog Health</h1>
  <div class="sub">Live gate metrics and the human-in-the-loop review queue</div>
</header>

<div class="wrap">
  <div class="cards" id="cards"></div>

  <div class="grid">
    <div>
      <div class="panel">
        <h2>INVEST failures (by dimension)</h2>
        <div id="invest"></div>
      </div>
      <div class="panel" style="margin-top:20px">
        <h2>Top recurring issues</h2>
        <div id="issues"></div>
      </div>
    </div>

    <div class="panel">
      <h2>Human review queue <span id="qcount" style="color:var(--muted);font-weight:400"></span></h2>
      <div id="queue"></div>
    </div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<script>
const $ = (id) => document.getElementById(id);

async function load(){
  const [m, q] = await Promise.all([
    fetch('/api/metrics').then(r=>r.json()),
    fetch('/api/queue').then(r=>r.json()),
  ]);
  renderCards(m); renderInvest(m); renderIssues(m); renderQueue(q);
  $('foot').textContent =
    `Policy team: ${m.policy_team} · oldest item in review: ${m.review_ageing.oldest_days}d · `
    + `avg wait: ${m.review_ageing.avg_days}d · ${m.human_reviewed} stories human-reviewed so far.`;
}

function renderCards(m){
  const c = [
    {label:'Gate pass-rate', value:Math.round(m.gate_pass_rate*100)+'%'},
    {label:'In human review', value:m.in_review, cls:'review'},
    {label:'Stories assessed', value:m.total},
    {label:'Auto pass / reject', value:`${m.counts.pass} / ${m.counts.reject}`},
  ];
  $('cards').innerHTML = c.map(x=>
    `<div class="stat ${x.cls||''}"><div class="label">${x.label}</div>
     <div class="value">${x.value}</div></div>`).join('');
}

function renderInvest(m){
  const f = m.invest_failures;
  const max = Math.max(1, ...Object.values(f));
  $('invest').innerHTML = Object.entries(f).map(([k,v])=>
    `<div class="bar-row"><div class="name">${k}</div>
       <div class="bar-track"><div class="bar-fill" style="width:${(v/max)*100}%"></div></div>
       <div class="n">${v}</div></div>`).join('');
}

function renderIssues(m){
  if(!m.top_issues.length){ $('issues').innerHTML='<div class="empty">No issues recorded.</div>'; return; }
  $('issues').innerHTML = m.top_issues.map(([name,cnt])=>
    `<div class="issue"><span>${name}</span><span class="cnt">${cnt}</span></div>`).join('');
}

function renderQueue(q){
  $('qcount').textContent = q.length ? `(${q.length})` : '';
  if(!q.length){ $('queue').innerHTML='<div class="empty">Nothing waiting for review. 🎉</div>'; return; }
  $('queue').innerHTML = q.map(it=>{
    const chips = it.issues.map(i=>{
      const blocked = it.blocked_by.includes(i);
      return `<span class="chip ${blocked?'block':''}">${i}${blocked?' · blocker':''}</span>`;
    }).join('');
    return `<div class="qitem" id="q-${it.story_id}">
      <div class="top"><div class="title">${it.title}</div>
        <div class="score">score ${it.score}</div></div>
      <div class="desc">${it.description}</div>
      <div class="chips">${chips}</div>
      <div class="meta">${it.story_id} · waiting ${it.age_days}d for a decision</div>
      <div class="actions">
        <button class="approve" onclick="decide('${it.story_id}','approved')">Approve → plan</button>
        <button class="reject" onclick="decide('${it.story_id}','rejected')">Send back</button>
      </div></div>`;
  }).join('');
}

async function decide(id, decision){
  const el = $('q-'+id); if(el) el.style.opacity = .5;
  await fetch('/api/review/'+id, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({decision, reviewer:'demo-reviewer'})
  });
  load();   // refresh metrics + queue
}

load();
</script>
</body>
</html>
